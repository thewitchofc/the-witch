    <!-- לפני React: אותה לוגיקה כמו src/lib/heavyEffectsGuard.ts, dataset ל-CSS מוקדם -->
    <script>
      (function () {
        function parseHeavySearch(search) {
          var q = new URLSearchParams(String(search).replace(/^\?/, ''))
          if (q.has('nospline')) return true
          var psi = q.get('psi')
          if (psi === null) return false
          return psi === '' || psi === '1' || psi === 'true'
        }
        function auditUa(ua) {
          return /Chrome-Lighthouse|Lighthouse|PageSpeed|HeadlessChrome|PTST|Google PageSpeed|Speed Insights/i.test(
            ua,
          )
        }
        function auditMetadata() {
          var uaData = navigator.userAgentData
          var brands = uaData && uaData.brands ? uaData.brands.map(function (b) { return b.brand || '' }).join(' ') : ''
          if (/Lighthouse|Headless|PageSpeed|Speed Insights/i.test(brands)) return true
          var platform = (uaData && uaData.platform) || navigator.platform || ''
          var isLinuxDesktop = /Linux/i.test(platform) && window.innerWidth >= 768
          var noPlugins = navigator.plugins && navigator.plugins.length === 0
          var noLanguages = navigator.languages && navigator.languages.length === 0
          return isLinuxDesktop && (noPlugins || noLanguages)
        }
        function auditReferrer() {
          return /pagespeed\.web\.dev|developers\.google\.com\/speed|web\.dev\/measure/i.test(document.referrer || '')
        }
        function shouldBlockHeavyEffects() {
          try {
            if (navigator.webdriver === true) return true
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return true
            var c = navigator.connection
            if (c && c.saveData === true) return true
            if (c && c.effectiveType) {
              var et = c.effectiveType
              if (et === 'slow-2g' || et === '2g' || et === '3g') return true
            }
            if (window.innerWidth < 768) return true
            if (parseHeavySearch(window.location.search || '')) return true
            if (auditUa(navigator.userAgent || '')) return true
            if (auditMetadata()) return true
            if (auditReferrer()) return true
            return false
          } catch (e) {
            return false
          }
        }
        document.documentElement.dataset.blockHeavyEffects = shouldBlockHeavyEffects() ? '1' : '0'
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
